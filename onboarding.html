<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视感新人入职 · Welcome to PartyKeys</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
    color: #e8eaff;
    background: linear-gradient(135deg, #0f1029 0%, #1a1040 35%, #1e1145 70%, #12203a 100%);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body { position: relative; }

  /* Animated background canvas */
  #bgCanvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* Section colors */
  :root {
    --c-general: #38bdf8;
    --c-product: #f472b6;
    --c-supply:  #34d399;
    --c-cn:      #fbbf24;
    --c-overseas:#a78bfa;
    --c-locked:  rgba(255,255,255,0.18);
    --c-done:    #4ade80;
  }

  /* App container */
  #app { position: relative; z-index: 1; min-height: 100vh; }

  /* ===== Welcome Screen ===== */
  .welcome {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .welcome-logo {
    font-size: 64px; margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(167,139,250,0.6));
    display: flex; align-items: center; justify-content: center;
  }
  .welcome-logo .vs-logo { width: 88px; height: 88px; display: block; }
  .welcome h1 {
    font-size: 48px; font-weight: 700; margin: 8px 0 4px;
    background: linear-gradient(90deg, #f472b6, #a78bfa, #38bdf8);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }
  .welcome .sub {
    font-size: 18px; color: #b4b8e0; margin-bottom: 4px;
  }
  .welcome .slogan {
    font-size: 14px; color: #8a8eb8; margin-bottom: 32px;
    letter-spacing: 2px;
  }
  .welcome-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px; padding: 36px 40px;
    max-width: 540px; width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .welcome-card h2 {
    margin: 0 0 8px; font-size: 22px; font-weight: 600;
  }
  .welcome-card p {
    color: #b4b8e0; font-size: 14px; line-height: 1.7; margin: 0 0 24px;
  }
  .form-row { margin-bottom: 16px; }
  .form-row label {
    display: block; font-size: 13px; color: #b4b8e0; margin-bottom: 8px;
  }
  .form-row input, .form-row select {
    width: 100%; padding: 12px 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 12px;
    color: #fff; font-size: 15px; font-family: inherit;
    outline: none; transition: all .2s;
  }
  .form-row input:focus, .form-row select:focus {
    border-color: #a78bfa;
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 0 3px rgba(167,139,250,0.18);
  }
  .form-row select option { background: #1a1040; color: #fff; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    color: #fff; font-weight: 600; font-size: 15px;
    border: none; border-radius: 12px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(167,139,250,0.35);
    transition: all .2s;
    font-family: inherit;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(167,139,250,0.45); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .btn.secondary {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.16);
    box-shadow: none;
  }
  .btn.secondary:hover { background: rgba(255,255,255,0.14); }
  .btn.ghost { background: transparent; box-shadow: none; padding: 8px 14px; font-weight: 500; }
  .btn.ghost:hover { background: rgba(255,255,255,0.08); transform: none; }
  .btn.full { width: 100%; }

  /* ===== Hub (main dashboard) ===== */
  .hub-header {
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    background: rgba(15,16,41,0.7);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 32px;
    display: flex; align-items: center; gap: 24px; justify-content: space-between;
  }
  .hub-header .brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 18px; font-weight: 700;
  }
  .hub-header .brand-emoji {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px;
  }
  .hub-header .brand-emoji .vs-logo { width: 100%; height: 100%; display: block; }
  .hub-header .gradient-text {
    background: linear-gradient(90deg, #f472b6, #a78bfa, #38bdf8);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hub-header .meta {
    display: flex; align-items: center; gap: 16px;
    font-size: 13px; color: #b4b8e0;
  }
  .progress-mini {
    display: flex; align-items: center; gap: 10px;
  }
  .progress-bar {
    width: 220px; height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #a78bfa, #38bdf8);
    transition: width .4s;
  }

  .hub {
    max-width: 1200px; margin: 0 auto; padding: 32px;
  }
  .hub-hero {
    text-align: center; padding: 24px 0 16px;
  }
  .hub-hero h1 {
    font-size: 36px; font-weight: 700; margin: 0 0 8px;
    background: linear-gradient(90deg, #f472b6, #a78bfa, #38bdf8);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .hub-hero p { color: #b4b8e0; font-size: 15px; margin: 0; }

  .section { margin-top: 32px; }
  .section-title {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 16px;
    border-left: 4px solid var(--accent, #a78bfa);
    padding-left: 12px;
  }
  .section-title h2 {
    margin: 0; font-size: 20px; font-weight: 600; color: #fff;
  }
  .section-title .desc { font-size: 13px; color: #8a8eb8; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    position: relative;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 20px;
    cursor: pointer;
    transition: all .25s;
    overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent, #a78bfa);
    opacity: .8;
  }
  .card:hover:not(.locked) {
    transform: translateY(-4px) scale(1.01);
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.18);
    box-shadow: 0 12px 32px rgba(0,0,0,0.3);
  }
  .card.locked {
    cursor: not-allowed; opacity: 0.5;
  }
  .card.locked::before { background: var(--c-locked); }
  .card.completed {
    border-color: rgba(74,222,128,0.4);
    background: rgba(74,222,128,0.05);
  }
  .card .emoji {
    font-size: 36px; margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(167,139,250,0.3));
  }
  .card h3 { margin: 0 0 6px; font-size: 17px; font-weight: 600; color: #fff; }
  .card .card-sub { font-size: 12px; color: #b4b8e0; line-height: 1.5; margin-bottom: 12px; min-height: 36px; }
  .card .card-foot {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: #8a8eb8;
  }
  .card .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 500;
  }
  .badge.done { background: rgba(74,222,128,0.15); color: #4ade80; }
  .badge.locked { background: rgba(255,255,255,0.08); color: #8a8eb8; }
  .badge.next { background: rgba(167,139,250,0.18); color: #c4b5fd; }
  .badge.optional { background: rgba(56,189,248,0.15); color: #38bdf8; }
  .badge.required { background: rgba(244,114,182,0.15); color: #f472b6; }

  .card-lock-icon {
    position: absolute; top: 16px; right: 16px;
    font-size: 18px; opacity: 0.6;
  }

  /* ===== Module page ===== */
  .module-page {
    max-width: 880px; margin: 0 auto; padding: 32px 24px 80px;
  }
  .module-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: #b4b8e0; text-decoration: none; font-size: 14px;
    margin-bottom: 16px; cursor: pointer;
    padding: 8px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    transition: all .2s;
  }
  .module-back:hover { background: rgba(255,255,255,0.1); }

  .module-header {
    display: flex; align-items: flex-start; gap: 20px;
    margin-bottom: 24px; padding-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .module-header .emoji { font-size: 56px; line-height: 1; }
  .module-header h1 { margin: 0 0 6px; font-size: 30px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .module-header .module-tag {
    display: inline-block; padding: 3px 10px;
    border-radius: 10px; font-size: 12px;
    background: var(--accent, rgba(167,139,250,0.2));
    color: #fff; opacity: 0.9; font-weight: 500;
  }
  .module-header .module-desc { color: #b4b8e0; font-size: 14px; margin-top: 8px; line-height: 1.6; }

  /* Content blocks */
  .block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 22px 26px;
    margin-bottom: 16px;
  }
  .block h2 { margin: 0 0 12px; font-size: 18px; font-weight: 600; color: #fff; }
  .block h3 { margin: 16px 0 8px; font-size: 15px; font-weight: 600; color: #c4b5fd; }
  .block p, .block li { color: #d8dafc; font-size: 14px; line-height: 1.75; }
  .block p { margin: 0 0 8px; }
  .block ul, .block ol { padding-left: 22px; margin: 8px 0; }
  .block li { margin: 4px 0; }
  .block strong { color: #fff; font-weight: 600; }
  .block em { color: #fbbf24; font-style: normal; font-weight: 500; }

  .callout {
    background: linear-gradient(135deg, rgba(167,139,250,0.1), rgba(244,114,182,0.08));
    border-left: 3px solid #a78bfa;
    border-radius: 8px;
    padding: 12px 16px;
    margin: 12px 0;
    font-size: 13px; color: #d8dafc;
  }
  .callout.warning {
    background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(244,114,182,0.06));
    border-left-color: #fbbf24;
  }
  .callout.info {
    background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(167,139,250,0.06));
    border-left-color: #38bdf8;
  }

  table.tbl {
    width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px;
    border-radius: 8px; overflow: hidden;
  }
  table.tbl th, table.tbl td {
    padding: 10px 12px; text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  table.tbl th {
    background: rgba(167,139,250,0.15); color: #fff; font-weight: 600;
  }
  table.tbl td { color: #d8dafc; }

  .city-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; margin: 12px 0;
  }
  .city-card {
    padding: 14px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
  }
  .city-card .city-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .city-card .city-role { font-size: 12px; color: #b4b8e0; line-height: 1.5; }

  .values-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px; margin: 12px 0;
  }
  .value-chip {
    padding: 12px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; text-align: center;
  }
  .value-chip .num {
    display: inline-block; width: 22px; height: 22px; line-height: 22px;
    border-radius: 50%; background: linear-gradient(135deg, #a78bfa, #f472b6);
    color: #fff; font-size: 11px; font-weight: 700;
    margin-bottom: 6px;
  }
  .value-chip .name { font-size: 14px; font-weight: 600; color: #fff; display: block; }
  .value-chip .desc { font-size: 11px; color: #8a8eb8; margin-top: 4px; }

  /* Quiz */
  .quiz {
    background: linear-gradient(135deg, rgba(167,139,250,0.08), rgba(56,189,248,0.06));
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 16px; padding: 22px 26px;
    margin-top: 24px;
  }
  .quiz h2 {
    margin: 0 0 6px; font-size: 18px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .quiz .quiz-sub { color: #b4b8e0; font-size: 13px; margin-bottom: 16px; }

  .question { margin: 18px 0; padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.06); }
  .question:first-of-type { border-top: none; padding-top: 0; }
  .question .qtext { font-size: 15px; font-weight: 500; color: #fff; margin-bottom: 12px; line-height: 1.5; }
  .question .qtext .qnum {
    display: inline-block; min-width: 24px; height: 24px;
    line-height: 24px; text-align: center;
    background: rgba(167,139,250,0.25);
    border-radius: 50%; font-size: 12px; font-weight: 700;
    margin-right: 8px;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    padding: 11px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer; transition: all .15s;
    font-size: 14px; color: #d8dafc;
    display: flex; align-items: center; gap: 10px;
  }
  .option .opt-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%; font-size: 11px; font-weight: 600;
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
  }
  .option:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
  .option.selected { background: rgba(167,139,250,0.18); border-color: #a78bfa; color: #fff; }
  .option.selected .opt-mark { background: #a78bfa; border-color: #a78bfa; color: #fff; }
  .option.correct {
    background: rgba(74,222,128,0.16); border-color: #4ade80; color: #fff;
  }
  .option.correct .opt-mark { background: #4ade80; border-color: #4ade80; color: #052e16; }
  .option.wrong {
    background: rgba(244,63,94,0.18); border-color: #f43f5e; color: #fff;
  }
  .option.wrong .opt-mark { background: #f43f5e; border-color: #f43f5e; color: #fff; }
  .option.disabled { cursor: default; pointer-events: none; }
  .explain {
    margin-top: 8px; padding: 10px 14px;
    background: rgba(56,189,248,0.08);
    border-left: 3px solid #38bdf8;
    border-radius: 8px;
    font-size: 13px; color: #d8dafc; line-height: 1.6;
    display: none;
  }
  .explain.show { display: block; }

  .quiz-actions {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .quiz-status { font-size: 13px; color: #b4b8e0; }
  .quiz-status.pass { color: #4ade80; font-weight: 600; }
  .quiz-status.fail { color: #f43f5e; font-weight: 500; }

  /* Certificate */
  .cert-page {
    max-width: 880px; margin: 0 auto; padding: 40px 24px 80px;
  }
  .cert {
    position: relative;
    background: linear-gradient(135deg, #1a1040 0%, #2a1855 50%, #1e1145 100%);
    border: 2px solid transparent;
    border-radius: 24px;
    padding: 60px 50px;
    text-align: center;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .cert::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(244,114,182,0.18), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(56,189,248,0.18), transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(167,139,250,0.18), transparent 50%);
    pointer-events: none;
  }
  .cert::after {
    content: ''; position: absolute; inset: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px; pointer-events: none;
  }
  .cert > * { position: relative; z-index: 1; }
  .cert .cert-emoji { font-size: 72px; margin-bottom: 12px; }
  .cert .cert-title { font-size: 14px; letter-spacing: 6px; color: #b4b8e0; margin-bottom: 8px; }
  .cert .cert-h {
    font-size: 32px; font-weight: 700; margin: 0 0 32px;
    background: linear-gradient(90deg, #f472b6, #a78bfa, #38bdf8);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .cert .cert-name {
    font-size: 42px; font-weight: 700; color: #fff; margin: 16px 0;
    border-bottom: 2px solid rgba(255,255,255,0.2);
    display: inline-block; padding: 0 40px 8px;
  }
  .cert .cert-body {
    font-size: 16px; color: #d8dafc; line-height: 1.9; margin: 24px auto;
    max-width: 560px;
  }
  .cert .cert-meta {
    display: flex; justify-content: space-between; margin-top: 40px;
    font-size: 13px; color: #b4b8e0; padding: 0 20px;
  }
  .cert .cert-meta .label { color: #8a8eb8; font-size: 11px; margin-bottom: 4px; }
  .cert .cert-sig { color: #fff; font-weight: 600; font-size: 16px; }

  .cert-actions { text-align: center; margin-top: 24px; display: flex; gap: 12px; justify-content: center; }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    padding: 12px 22px;
    background: rgba(15,16,41,0.95);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 100px;
    color: #fff; font-size: 14px; font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: all .3s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state under cert */
  .cert-locked {
    background: rgba(255,255,255,0.04);
    border: 1px dashed rgba(255,255,255,0.12);
    border-radius: 16px; padding: 32px;
    text-align: center; color: #b4b8e0;
  }

  @media (max-width: 720px) {
    .hub { padding: 20px 16px; }
    .hub-header { padding: 12px 16px; }
    .progress-bar { width: 120px; }
    .hub-hero h1 { font-size: 28px; }
    .module-page { padding: 20px 16px 60px; }
    .module-header h1 { font-size: 24px; }
    .cert { padding: 40px 24px; }
    .cert .cert-name { font-size: 30px; padding: 0 20px 6px; }
  }

  /* Print: cert nice on paper */
  @media print {
    body { background: #fff; }
    .hub-header, .module-back, .cert-actions, .btn { display: none !important; }
    .cert { box-shadow: none; border: 2px solid #1a1040; color: #1a1040; background: #fff; }
    .cert .cert-name, .cert .cert-h { color: #1a1040 !important; -webkit-text-fill-color: #1a1040 !important; background: none !important; }
    .cert .cert-body, .cert .cert-meta, .cert .cert-title { color: #555 !important; }
  }

  .hidden { display: none !important; }

  /* ===== Admin Mode ===== */
  .admin-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 100px;
    background: linear-gradient(135deg, #fbbf24, #f472b6);
    color: #1a1040; font-weight: 700; font-size: 12px;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 10px rgba(251,191,36,0.3);
  }
  .admin-banner {
    background: linear-gradient(135deg, rgba(251,191,36,0.10), rgba(244,114,182,0.08));
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 12px; padding: 12px 16px;
    font-size: 13px; color: #fcd34d;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .admin-entry {

/* ---------- STATE & PERSISTENCE ---------- */

const STORE_KEY = 'partykeys_onboarding_v1';
const ADMIN_PASSWORD = 'AISuperman';

// 视感企业 logo (SVG) — 圆 + 圆角方框互锁 + 紫色小点，渐变 cyan→purple→pink→orange
const LOGO_SVG = `<svg class="vs-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect x="43" y="14" width="46" height="46" rx="9" ry="9" stroke="url(#vsLogoGradient)" stroke-width="6.5" stroke-linejoin="round"/>
  <circle cx="32" cy="60" r="24" stroke="url(#vsLogoGradient)" stroke-width="6.5"/>
  <circle cx="78" cy="83" r="5" fill="#a78bfa"/>
</svg>`;

function defaultState() {
  return {
    name: '', dept: '', startedAt: '', completedAt: '',
    moduleStatus: {}, // id -> { passed, score, attempts }
    adminMode: false,
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  } catch (e) { return defaultState(); }
}
function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

/* ---------- LOGIC: unlock & progress ---------- */

function generalModules() { return MODULES.filter(m => m.kind === 'general'); }
function deptModules() { return MODULES.filter(m => m.kind === 'department'); }
function deptModuleFor(deptId) { return MODULES.find(m => m.kind === 'department' && m.dept === deptId); }

function isPassed(id) {
  return state.moduleStatus[id] && state.moduleStatus[id].passed;
}

// Unlock rules:
//   General (g1..g7): sequential — gN requires g{N-1}
//   Department (d_*): unlocked after ALL general modules passed; user can do their own first.
function isUnlocked(mod) {
  if (state.adminMode) return true;
  if (mod.kind === 'general') {
    const idx = generalModules().findIndex(m => m.id === mod.id);
    if (idx <= 0) return true;
    const prev = generalModules()[idx - 1];
    return isPassed(prev.id);
  }
  if (mod.kind === 'department') {
    return generalModules().every(m => isPassed(m.id));
  }
  return false;
}

function isRequired(mod) {
  // All general are required. Among dept, only the user's own dept is required.
  if (mod.kind === 'general') return true;
  return mod.dept === state.dept;
}

function progressPct() {
  const required = MODULES.filter(isRequired);
  if (required.length === 0) return 0;
  const done = required.filter(m => isPassed(m.id)).length;
  return Math.round(done / required.length * 100);
}

function allRequiredDone() {
  return MODULES.filter(isRequired).every(m => isPassed(m.id));
}

function navigate(view, payload) {
  if (view === 'welcome') return renderWelcome();
  if (view === 'admin-login') return renderAdminLogin();
  if (view === 'hub') return renderHub();
  if (view === 'module') return renderModule(payload);
  if (view === 'cert') return renderCert();
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function moduleCard(m, isMyDept = false) {
  const passed = isPassed(m.id);
  const unlocked = isUnlocked(m);
  const status = passed ? 'completed' : (unlocked ? 'unlocked' : 'locked');
  let badge;
  if (passed) badge = '<span class="badge done">✓ 已完成</span>';
  else if (!unlocked) badge = '<span class="badge locked">🔒 待解锁</span>';
  else badge = '<span class="badge next">▶ 可以开始</span>';

  let typeBadge;
  if (m.kind === 'general') typeBadge = '<span class="badge required">必修</span>';
  else if (m.dept === state.dept) typeBadge = '<span class="badge required">必修 (你的部门)</span>';
  else typeBadge = '<span class="badge optional">选修</span>';

  return `
    <div class="card ${status === 'locked' ? 'locked' : ''} ${passed ? 'completed' : ''}"
         data-mid="${m.id}" style="--accent: ${m.accent}">
      ${status === 'locked' ? '<span class="card-lock-icon">🔒</span>' : ''}
      <div class="emoji">${m.emoji}</div>
      <h3>${m.title}</h3>
      <div class="card-sub">${m.sub}</div>
      <div class="card-foot">${typeBadge}${badge}</div>
    </div>
  `;
}

      <div class="brand">
        <span class="brand-emoji">${LOGO_SVG}</span>
        <span class="gradient-text">视感新人入职</span>
      </div>
      <div class="meta">${headerMeta}</div>
    </div>

    <div class="module-page" style="--accent: ${accentVar}">
      <a class="module-back" id="backBtn">← 返回大厅</a>
      ${adminBanner}
      <div class="module-header">
        <div class="emoji">${mod.emoji}</div>
        <div>
          <span class="module-tag" style="background: ${accentVar}; color: #1a1040; font-weight: 600;">${mod.tag}</span>
          <h1>${mod.title}</h1>
          <div class="module-desc">${mod.sub}</div>
        </div>
      </div>
      ${blockHtml}
      ${quizSection}
    </div>
  `;

  // Render questions only if quiz is shown (i.e., not admin mode)
  if (!admin) renderQuiz(mod);

  document.getElementById('hubBtn').addEventListener('click', () => navigate('hub'));
  document.getElementById('backBtn').addEventListener('click', () => navigate('hub'));
  window.scrollTo(0, 0);
}

let quizAnswers = {};
function renderQuiz(mod) {
  quizAnswers = {};
  const html = mod.quiz.map((q, i) => `
    <div class="question" data-qi="${i}">
      <div class="qtext"><span class="qnum">${i+1}</span>${q.q}</div>
      <div class="options">
        ${q.opts.map((opt, oi) => `
          <div class="option" data-qi="${i}" data-oi="${oi}">
            <span class="opt-mark">${String.fromCharCode(65+oi)}</span>
            <span>${opt}</span>
          </div>`).join('')}
      </div>
      <div class="explain"><strong>💡 解释：</strong>${q.why}</div>
    </div>
  `).join('');
  document.getElementById('questions').innerHTML = html;

  document.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => {
      const qi = +el.getAttribute('data-qi');
      const oi = +el.getAttribute('data-oi');
      // Lock if already submitted
      if (el.classList.contains('disabled')) return;
      // Clear other selections in this question
      document.querySelectorAll(`.option[data-qi="${qi}"]`).forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      quizAnswers[qi] = oi;
    });
  });

  // Use .onclick (replaces previous handler) to avoid accumulating listeners on re-render.
  document.getElementById('submitQuizBtn').onclick = () => submitQuiz(mod);
  document.getElementById('resetQuizBtn').onclick = () => renderQuiz(mod);
  document.getElementById('submitQuizBtn').textContent = '提交答案';
  document.getElementById('quizStatus').className = 'quiz-status';
  document.getElementById('quizStatus').textContent = '未提交';
}

function submitQuiz(mod) {
  let correct = 0;
  mod.quiz.forEach((q, i) => {
    const picked = quizAnswers[i];
    if (picked === undefined) return;
    const opts = document.querySelectorAll(`.option[data-qi="${i}"]`);
    opts.forEach(o => o.classList.add('disabled'));
    if (picked === q.a) {
      opts[picked].classList.remove('selected');
      opts[picked].classList.add('correct');
      correct++;
    } else {
      opts[picked].classList.remove('selected');
      opts[picked].classList.add('wrong');
      opts[q.a].classList.add('correct');
    }
    document.querySelector(`.question[data-qi="${i}"] .explain`).classList.add('show');
  });
  const total = mod.quiz.length;
  const pct = Math.round(correct / total * 100);
  const passed = pct >= 80;
  const status = document.getElementById('quizStatus');
  status.className = 'quiz-status ' + (passed ? 'pass' : 'fail');
  status.innerHTML = passed
    ? `🎉 ${correct} / ${total} 答对（${pct}%） — 已通过！`
    : `${correct} / ${total} 答对（${pct}%） — 未达通过线 80%，点"重答"再试。`;

  // Update state
  const prev = state.moduleStatus[mod.id] || { passed: false, score: 0, attempts: 0 };
  state.moduleStatus[mod.id] = {
    passed: passed || prev.passed, // sticky pass
    score: Math.max(prev.score, pct),
    attempts: prev.attempts + 1,
  };
  saveState();

  document.getElementById('submitQuizBtn').textContent = passed ? '✓ 已通过 · 返回大厅' : '继续答题';
  document.getElementById('submitQuizBtn').onclick = passed ? (() => navigate('hub')) : (() => renderQuiz(mod));
  if (passed) {
    toast('🎉 模块通过！');
    if (allRequiredDone() && !state.completedAt) {
      state.completedAt = new Date().toISOString();
      saveState();
      setTimeout(() => toast('🏆 全部必修模块完成！可以领证书了'), 1500);
    }
  }
}

  document.getElementById('hubBtn2').addEventListener('click', () => navigate('hub'));

/* ---------- Toast ---------- */
const toastEl = document.getElementById('toast');
let toastTimer;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
}

/* ---------- Background animation ---------- */
(function bgAnim() {
  const c = document.getElementById('bgCanvas');
  const ctx = c.getContext('2d');
  let W, H;
  function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  const notes = ['♪','♫','♩','♬','♭','♯'];
  const particles = [];
  for (let i = 0; i < 26; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vy: 0.15 + Math.random() * 0.4,
      vx: (Math.random() - 0.5) * 0.2,
      size: 12 + Math.random() * 18,
      hue: 250 + Math.random() * 80,
      alpha: 0.05 + Math.random() * 0.18,
      char: notes[Math.floor(Math.random() * notes.length)],
      r: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.005,
    });
  }
  function frame() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.y += p.vy; p.x += p.vx; p.r += p.vr;
      if (p.y > H + 20) { p.y = -20; p.x = Math.random() * W; }
      if (p.x < -20) p.x = W + 10;
      if (p.x > W + 20) p.x = -10;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.r);
      ctx.font = `${p.size}px sans-serif`;
      ctx.fillStyle = `hsla(${p.hue}, 80%, 75%, ${p.alpha})`;
      ctx.fillText(p.char, 0, 0);
      ctx.restore();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ---------- Boot ---------- */
if (state.adminMode || (state.name && state.dept)) {
  navigate('hub');
} else {
  navigate('welcome');
}
